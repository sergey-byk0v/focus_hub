<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #2a2a2a;
      color: #e0e0e0;
      padding: 0 16px 16px;
      font-size: 14px;
    }

    /* Tab bar */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid #444;
      margin: 0 -16px 12px;
      padding: 0 16px;
      position: sticky;
      top: 0;
      background: #2a2a2a;
      z-index: 1;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: #e0e0e0;
      border-bottom-color: #b0b0b0;
    }
    .tab-btn:hover {
      color: #b0b0b0;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* AM controls */
    .status {
      text-align: center;
      font-size: 11px;
      margin-bottom: 4px;
    }
    .status.capturing { color: #90ee90; }
    .status.idle { color: #888; }
    .control-group {
      margin-bottom: 12px;
    }
    .control-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      font-size: 12px;
      color: #bbb;
    }
    .control-group label span.value {
      color: #b0b0b0;
      font-weight: bold;
    }
    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: #383838;
      border-radius: 3px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #b0b0b0;
      cursor: pointer;
    }
    select {
      width: 100%;
      padding: 6px 8px;
      background: #383838;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .freq-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .freq-row input[type="range"] {
      flex: 1;
    }
    .freq-step {
      width: 36px;
      height: 28px;
      border: 1px solid #555;
      background: #383838;
      color: #b0b0b0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .freq-step:hover {
      background: #4a4a4a;
    }
    .freq-step:active {
      background: #b0b0b0;
      color: #2a2a2a;
    }
    #captureBtn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }
    #captureBtn.start {
      background: #b0b0b0;
      color: #2a2a2a;
    }
    #captureBtn.start:hover {
      background: #909090;
    }
    #captureBtn.stop {
      background: #ff4757;
      color: #fff;
    }
    #captureBtn.stop:hover {
      background: #e63946;
    }
    #captureBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .controls { pointer-events: none; opacity: 0.4; }
    .controls.enabled { pointer-events: auto; opacity: 1; }
    .spatial-section {
      margin-top: 4px;
      padding: 12px;
      background: #333;
      border-radius: 8px;
      border: 1px solid #555;
    }
    .spatial-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
    }
    .spatial-header label {
      font-size: 12px;
      color: #bbb;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .spatial-header input[type="checkbox"] {
      accent-color: #b0b0b0;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .spatial-controls {
      margin-top: 10px;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .spatial-controls.enabled {
      opacity: 1;
      pointer-events: auto;
    }
    .spatial-controls label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      font-size: 12px;
      color: #999;
    }
    .spatial-controls label span.value {
      color: #b0b0b0;
      font-weight: bold;
    }
    .timer-section {
      margin-top: 8px;
      padding: 12px;
      background: #333;
      border-radius: 8px;
      border: 1px solid #555;
    }
    #timerDisplay {
      text-align: center;
      font-size: 36px;
      font-weight: bold;
      color: #b0b0b0;
      padding: 4px 0 8px;
      font-variant-numeric: tabular-nums;
    }
    .timer-presets {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .timer-presets button {
      flex: 1;
      padding: 6px 2px;
      border: 1px solid #555;
      background: #383838;
      color: #b0b0b0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
    }
    .timer-presets button:hover { background: #4a4a4a; }
    .timer-presets button:active { background: #b0b0b0; color: #2a2a2a; }
    .timer-actions {
      display: flex;
      gap: 6px;
    }
    .timer-actions input {
      flex: 1;
      padding: 5px 6px;
      background: #383838;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 11px;
      width: 50px;
    }
    .timer-actions input:focus { outline: none; border-color: #b0b0b0; }
    .timer-btn {
      padding: 5px 10px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
    }
    .timer-btn.primary { background: #b0b0b0; color: #2a2a2a; }
    .timer-btn.danger { background: #ff4757; color: #fff; }

    /* Reasons tab */
    .reason-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #444;
    }
    .reason-toggle label {
      font-size: 13px;
      color: #ccc;
    }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: #555;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-switch.active {
      background: #4caf50;
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch.active::after {
      transform: translateX(20px);
    }
    .site-list {
      margin: 10px 0;
    }
    .site-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      background: #333;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .site-item .site-domain {
      color: #ccc;
    }
    .site-item .remove-btn {
      background: none;
      border: none;
      color: #ff4757;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
    }
    .site-item .remove-btn:hover {
      color: #ff6b81;
    }
    .add-site-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .add-site-row input {
      flex: 1;
      padding: 7px 8px;
      background: #383838;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
    }
    .add-site-row input:focus {
      border-color: #b0b0b0;
    }
    .add-site-row button {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      background: #b0b0b0;
      color: #2a2a2a;
      white-space: nowrap;
    }
    .add-site-row button:hover {
      background: #909090;
    }
    .reason-actions {
      margin-top: 12px;
      display: flex;
      gap: 6px;
    }
    .reason-actions button {
      flex: 1;
      padding: 6px 12px;
      border: 1px solid #555;
      background: #383838;
      color: #b0b0b0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
    }
    .reason-actions button:hover {
      background: #4a4a4a;
    }
    .status-msg {
      font-size: 11px;
      color: #888;
      text-align: center;
      padding: 8px;
    }
  </style>
</head>
<body>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="settings">Settings</button>
    <button class="tab-btn" data-tab="reasons">Reasons</button>
  </div>

  <!-- Settings Tab -->
  <div id="tab-settings" class="tab-content active">
    <button id="captureBtn" class="start">Start Capture</button>
    <div id="status" class="status idle">Idle</div>

    <div id="controls" class="controls">
      <div class="control-group">
        <label>Modulator Frequency <span id="freqValue" class="value">16.0 Hz</span></label>
        <div class="freq-row">
          <button class="freq-step" id="freqDown">-1</button>
          <input type="range" id="frequency" min="1" max="100" step="1" value="16">
          <button class="freq-step" id="freqUp">+1</button>
        </div>
      </div>

      <div class="control-group">
        <label>Depth <span id="depthValue" class="value">50%</span></label>
        <input type="range" id="depth" min="0" max="100" step="1" value="50">
      </div>

      <div class="control-group">
        <label>Waveform</label>
        <select id="waveform">
          <option value="sine">Sine</option>
          <option value="square">Square</option>
          <option value="triangle">Triangle</option>
          <option value="sawtooth">Sawtooth</option>
        </select>
      </div>

      <div class="spatial-section">
        <div class="spatial-header">
          <label>
            <input type="checkbox" id="spatialEnabled">
            Spatial Movement
          </label>
        </div>
        <div id="spatialControls" class="spatial-controls">
          <div class="control-group" style="margin-bottom:8px;">
            <label>Speed <span id="spatialSpeedValue" class="value">0.3 Hz</span></label>
            <input type="range" id="spatialSpeed" min="0.1" max="2" step="1" value="0.3">
          </div>
          <div class="control-group">
            <label>Width <span id="spatialWidthValue" class="value">70%</span></label>
            <input type="range" id="spatialWidth" min="0" max="100" step="1" value="70">
          </div>
        </div>
      </div>

      <div class="timer-section">
        <div id="timerDisplay">00:00</div>
        <div id="countdownControls">
          <div class="timer-presets">
            <button class="preset-btn" data-seconds="900">15m</button>
            <button class="preset-btn" data-seconds="1800">30m</button>
            <button class="preset-btn" data-seconds="3600">60m</button>
            <button class="preset-btn" data-seconds="5400">90m</button>
          </div>
          <div class="timer-actions">
            <input type="number" id="customSeconds" min="1" max="5400" value="900" placeholder="sec">
            <button id="startBtn" class="timer-btn primary">Start</button>
            <button id="stopBtn" class="timer-btn danger" style="display:none">Stop</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Reasons Tab -->
  <div id="tab-reasons" class="tab-content">
    <div class="reason-toggle">
      <label>Enable Site Blocking</label>
      <div id="blockToggle" class="toggle-switch active"></div>
    </div>
    <div id="siteList" class="site-list"></div>
    <div class="add-site-row">
      <input id="newSiteInput" placeholder="e.g. reddit.com" spellcheck="false">
      <button id="addSiteBtn">Add</button>
    </div>
    <div class="reason-actions">
      <button id="exportCsvBtn">Export CSV</button>
      <button id="restoreDefaultsBtn">Restore Defaults</button>
    </div>
    <div id="reasonStatus" class="status-msg"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
