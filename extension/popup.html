<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #2a2a2a;
      color: #e0e0e0;
      padding: 16px;
      font-size: 14px;
    }
    .status {
      text-align: center;
      font-size: 11px;
      margin-bottom: 8px;
    }
    .status.capturing { color: #90ee90; }
    .status.idle { color: #888; }
    .control-group {
      margin-bottom: 12px;
    }
    .control-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      font-size: 12px;
      color: #bbb;
    }
    .control-group label span.value {
      color: #b0b0b0;
      font-weight: bold;
    }
    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: #383838;
      border-radius: 3px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #b0b0b0;
      cursor: pointer;
    }
    select {
      width: 100%;
      padding: 6px 8px;
      background: #383838;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .freq-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .freq-row input[type="range"] {
      flex: 1;
    }
    .freq-step {
      width: 36px;
      height: 28px;
      border: 1px solid #555;
      background: #383838;
      color: #b0b0b0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .freq-step:hover {
      background: #4a4a4a;
    }
    .freq-step:active {
      background: #b0b0b0;
      color: #2a2a2a;
    }
    #captureBtn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 4px;
    }
    #captureBtn.start {
      background: #b0b0b0;
      color: #2a2a2a;
    }
    #captureBtn.start:hover {
      background: #909090;
    }
    #captureBtn.stop {
      background: #ff4757;
      color: #fff;
    }
    #captureBtn.stop:hover {
      background: #e63946;
    }
    #captureBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .controls { }
    .controls.enabled { }

    input[name="tab"] { display: none; }
    .tab-panel { display: none; }
    #tabTimer:checked ~ .tab-bar label[for="tabTimer"],
    #tabBlock:checked ~ .tab-bar label[for="tabBlock"],
    #tabModulation:checked ~ .tab-bar label[for="tabModulation"] {
      color: #e0e0e0;
      border-bottom-color: #b0b0b0;
    }
    #tabTimer:checked ~ #controls #panelTimer { display: block; }
    #tabBlock:checked ~ #controls #panelBlock { display: block; }
    #tabModulation:checked ~ #controls #panelModulation { display: block; }

    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #444;
      margin-bottom: 12px;
    }
    .tab-label {
      padding: 6px 12px;
      cursor: pointer;
      color: #888;
      font-size: 11px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
      user-select: none;
    }
    .tab-label:hover { color: #b0b0b0; }

    .preset-grid-btn {
      padding: 5px 8px;
      border: 1px solid #555;
      background: #383838;
      color: #b0b0b0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      white-space: nowrap;
    }
    .preset-grid-btn:hover { background: #4a4a4a; }
    .preset-grid-btn:active { background: #b0b0b0; color: #2a2a2a; }

    #presetGrid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .section-box {
      margin-top: 4px;
      padding: 12px;
      background: #333;
      border-radius: 8px;
      border: 1px solid #555;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
    }
    .section-header label {
      font-size: 12px;
      color: #bbb;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-header input[type="checkbox"] {
      accent-color: #b0b0b0;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .section-sub-controls {
      margin-top: 10px;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .section-sub-controls.enabled {
      opacity: 1;
      pointer-events: auto;
    }
    .section-sub-controls label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      font-size: 12px;
      color: #999;
    }
    .section-sub-controls label span.value {
      color: #b0b0b0;
      font-weight: bold;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #bbb;
      cursor: pointer;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: #333;
      border-radius: 8px;
      border: 1px solid #555;
    }
    .toggle-row input[type="checkbox"] {
      accent-color: #b0b0b0;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .block-site-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #3a3a3a;
    }
    .block-site-row:last-child { border-bottom: none; }
    .block-site-row input[type="checkbox"] {
      accent-color: #b0b0b0;
      width: 13px;
      height: 13px;
      cursor: pointer;
    }
    .block-site-row .site-name {
      flex: 1;
      font-size: 12px;
      color: #ccc;
    }
    .block-site-row .site-del {
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      color: #ff4757;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .block-site-row .site-del:hover {
      background: #4a4a4a;
    }

    .add-site-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .add-site-row input {
      flex: 1;
      padding: 6px 8px;
      background: #383838;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 11px;
    }
    .add-site-row input:focus { outline: none; border-color: #b0b0b0; }

    .timer-section {
      padding: 12px;
      background: #333;
      border-radius: 8px;
      border: 1px solid #555;
    }
    #timerDisplay {
      text-align: center;
      font-size: 36px;
      font-weight: bold;
      color: #b0b0b0;
      padding: 4px 0 8px;
      font-variant-numeric: tabular-nums;
    }
    .timer-presets {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .timer-presets button {
      flex: 1;
      padding: 6px 2px;
      border: 1px solid #555;
      background: #383838;
      color: #b0b0b0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
    }
    .timer-presets button:hover { background: #4a4a4a; }
    .timer-presets button:active { background: #b0b0b0; color: #2a2a2a; }
    .timer-actions {
      display: flex;
      gap: 6px;
    }
    .timer-actions input {
      flex: 1;
      padding: 5px 6px;
      background: #383838;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 11px;
      width: 50px;
    }
    .timer-actions input:focus { outline: none; border-color: #b0b0b0; }
    .timer-btn {
      padding: 5px 10px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
    }
    .timer-btn.primary { background: #b0b0b0; color: #2a2a2a; }
    .timer-btn.danger { background: #ff4757; color: #fff; }

    #customMinutes::-webkit-inner-spin-button,
    #customMinutes::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    #customMinutes { -moz-appearance: textfield; }
</style>
</head>
<body>
  <input type="radio" name="tab" id="tabTimer" checked>
  <input type="radio" name="tab" id="tabModulation">
  <input type="radio" name="tab" id="tabBlock">

  <button id="captureBtn" class="start">Start Capture</button>
  <div id="status" class="status idle">Idle</div>

  <div class="tab-bar">
    <label for="tabTimer" class="tab-label">Timer</label>
    <label for="tabModulation" class="tab-label">Modulation</label>
    <label for="tabBlock" class="tab-label">Reasons</label>
  </div>

  <div id="controls" class="controls">
    <div class="tab-panel" id="panelTimer">
      <div class="timer-section">
        <div id="timerDisplay">00:00</div>
        <div id="countdownControls">
          <div class="timer-presets">
            <button class="preset-btn" data-seconds="900">15m</button>
            <button class="preset-btn" data-seconds="1800">30m</button>
            <button class="preset-btn" data-seconds="3600">60m</button>
            <button class="preset-btn" data-seconds="5400">90m</button>
          </div>
          <div class="timer-actions">
            <input type="number" id="customMinutes" min="1" max="90" value="15" placeholder="min">
            <span style="font-size:11px;color:#888;margin-left:2px;flex-shrink:0;">min</span>
            <button id="startBtn" class="timer-btn primary">Start</button>
            <button id="stopBtn" class="timer-btn danger" style="display:none">Stop</button>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="panelModulation">
      <div class="section-box">
        <div class="section-header">
          <label>Presets</label>
        </div>
        <div id="presetGrid"></div>
        <div style="display:flex; gap:6px;">
          <input type="text" id="presetNameInput" placeholder="Preset name..." style="flex:1; padding:5px 6px; background:#383838; color:#e0e0e0; border:1px solid #555; border-radius:6px; font-size:11px;">
          <button id="savePresetBtn" class="timer-btn primary" style="font-size:11px; white-space:nowrap;">Save</button>
        </div>
      </div>

      <div class="control-group">
        <label>Modulator Frequency <span id="freqValue" class="value">16.0 Hz</span></label>
        <div class="freq-row">
          <button class="freq-step" id="freqDown">-1</button>
          <input type="range" id="frequency" min="1" max="100" step="1" value="16">
          <button class="freq-step" id="freqUp">+1</button>
        </div>
      </div>

      <div class="control-group">
        <label>Depth <span id="depthValue" class="value">50%</span></label>
        <input type="range" id="depth" min="0" max="100" step="1" value="50">
      </div>

      <div class="control-group">
        <label>Waveform</label>
        <select id="waveform">
          <option value="sine">Sine</option>
          <option value="square">Square</option>
          <option value="triangle">Triangle</option>
          <option value="sawtooth">Sawtooth</option>
        </select>
      </div>

      <div class="section-box">
        <div class="section-header">
          <label>
            <input type="checkbox" id="spatialEnabled">
            Spatial Movement
          </label>
        </div>
        <div id="spatialControls" class="section-sub-controls">
          <div class="control-group" style="margin-bottom:8px;">
            <label>Speed <span id="spatialSpeedValue" class="value">0.3 Hz</span></label>
            <input type="range" id="spatialSpeed" min="0.1" max="2" step="1" value="0.3">
          </div>
          <div class="control-group">
            <label>Width <span id="spatialWidthValue" class="value">70%</span></label>
            <input type="range" id="spatialWidth" min="0" max="100" step="1" value="70">
          </div>
        </div>
      </div>

      <div class="section-box">
        <div class="section-header">
          <label>
            <input type="checkbox" id="crossoverEnabled">
            Low-Freq Only
          </label>
        </div>
        <div id="crossoverControls" class="section-sub-controls">
          <div class="control-group">
            <label>Crossover Freq <span id="crossoverFreqValue" class="value">300 Hz</span></label>
            <input type="range" id="crossoverFreq" min="50" max="2000" step="10" value="300">
          </div>
        </div>
      </div>

      <div class="section-box">
        <div class="section-header">
          <label>
            <input type="checkbox" id="pinkNoiseEnabled">
            Noise
          </label>
          <label style="margin-left:auto; font-size:11px; color:#999; cursor:pointer; display:flex; align-items:center; gap:4px;">
            <input type="checkbox" id="pinkNoiseModulate">
            Modulate
          </label>
        </div>
        <div id="pinkNoiseControls" class="section-sub-controls">
          <div class="control-group">
            <label>Type</label>
            <select id="noiseType">
              <option value="white">White</option>
              <option value="pink" selected>Pink</option>
              <option value="brown">Brown</option>
              <option value="gray">Gray</option>
            </select>
          </div>
          <div class="control-group">
            <label>Mix <span id="pinkNoiseMixValue" class="value">3%</span></label>
            <input type="range" id="pinkNoiseMix" min="0" max="100" step="1" value="3">
          </div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="panelBlock">
      <label class="toggle-row">
        <input type="checkbox" id="blockEnabled">
        Blocking Active
      </label>
      <div id="blockedSiteList"></div>
      <div class="add-site-row">
        <input type="text" id="newSiteInput" placeholder="example.com">
        <button id="addSiteBtn" class="timer-btn primary" style="font-size:11px; white-space:nowrap;">+ Add</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
