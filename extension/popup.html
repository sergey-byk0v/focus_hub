<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      --bg: #2a2a2a;
      --text-on-accent: #2a2a2a;
      --surface: #333;
      --surface-alt: #383838;
      --surface-hover: #4a4a4a;
      --text: #e0e0e0;
      --text-secondary: #b0b0b0;
      --text-muted: #888;
      --text-label: #bbb;
      --text-subtle: #999;
      --text-site: #ccc;
      --border: #555;
      --border-light: #444;
      --border-subtle: #3a3a3a;
      --accent: #b0b0b0;
      --accent-hover: #909090;
      --danger: #ff4757;
      --danger-hover: #e63946;
      --success: #90ee90;
      --white: #fff;
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      font-size: 14px;
    }
    .status {
      text-align: center;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .status.capturing { color: var(--success); }
    .status.idle { color: var(--text-muted); }
    .control-group {
      margin-bottom: 12px;
    }
    .control-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      font-size: 12px;
      color: var(--text-label);
    }
    .control-group label span.value {
      color: var(--text-secondary);
      font-weight: bold;
    }
    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: var(--surface-alt);
      border-radius: 3px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    select {
      width: 100%;
      padding: 6px 8px;
      background: var(--surface-alt);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .freq-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .freq-row input[type="range"] {
      flex: 1;
    }
    .freq-step {
      width: 36px;
      height: 28px;
      border: 1px solid var(--border);
      background: var(--surface-alt);
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .freq-step:hover {
      background: var(--surface-hover);
    }
    .freq-step:active {
      background: var(--accent);
      color: var(--text-on-accent);
    }
    #captureBtn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 4px;
    }
    #captureBtn.start {
      background: var(--accent);
      color: var(--text-on-accent);
    }
    #captureBtn.start:hover {
      background: var(--accent-hover);
    }
    #captureBtn.stop {
      background: var(--danger);
      color: var(--white);
    }
    #captureBtn.stop:hover {
      background: var(--danger-hover);
    }
    #captureBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .controls { }
    .controls.enabled { }

    input[name="tab"] { display: none; }
    .tab-panel { display: none; }
    #tabTimer:checked ~ .tab-bar label[for="tabTimer"],
    #tabModulation:checked ~ .tab-bar label[for="tabModulation"],
    #tabBlock:checked ~ .tab-bar label[for="tabBlock"],
    #tabGamba:checked ~ .tab-bar label[for="tabGamba"] {
      color: var(--text);
      border-bottom-color: var(--accent);
    }
    #tabTimer:checked ~ #controls #panelTimer { display: block; }
    #tabModulation:checked ~ #controls #panelModulation { display: block; }
    #tabBlock:checked ~ #controls #panelBlock { display: block; }
    #tabGamba:checked ~ #controls #panelGamba { display: block; }

    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 12px;
    }
    .tab-label {
      padding: 6px 12px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
      user-select: none;
    }
    .tab-label:hover { color: var(--text-secondary); }

    .preset-grid-btn {
      padding: 5px 8px;
      border: 1px solid var(--border);
      background: var(--surface-alt);
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
    }
    .preset-grid-btn:hover { background: var(--surface-hover); }
    .preset-grid-btn:active { background: var(--accent); color: var(--text-on-accent); }

    #presetGrid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .section-box {
      margin-bottom: 6px;
      margin-top: 4px;
      padding: 12px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
    }
    .section-header label {
      font-size: 12px;
      color: var(--text-label);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-header input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .section-sub-controls {
      margin-top: 10px;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .section-sub-controls.enabled {
      opacity: 1;
      pointer-events: auto;
    }
    .section-sub-controls label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      font-size: 12px;
      color: var(--text-subtle);
    }
    .section-sub-controls label span.value {
      color: var(--text-secondary);
      font-weight: bold;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-label);
      cursor: pointer;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .toggle-row input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .mode-toggle {
      display: flex;
      background: var(--surface-alt);
      border-radius: 6px;
      padding: 2px;
      margin-bottom: 12px;
    }
    .mode-toggle button {
      flex: 1;
      padding: 6px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.15s;
    }
    .mode-toggle button.active {
      background: var(--border);
      color: var(--text);
    }

    .block-site-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .block-site-row:last-child { border-bottom: none; }
    .block-site-row input[type="checkbox"] {
      accent-color: var(--accent);
      width: 13px;
      height: 13px;
      cursor: pointer;
    }
    .block-site-row .site-name {
      flex: 1;
      font-size: 12px;
      color: var(--text-site);
    }
    .block-site-row .site-del {
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      color: var(--danger);
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .block-site-row .site-del:hover {
      background: var(--surface-hover);
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .theme-btn {
      padding: 8px 6px;
      border: 2px solid var(--border);
      background: var(--surface-alt);
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 10px;
      font-weight: bold;
      text-align: center;
      transition: all 0.15s;
      min-height: 52px;
      width: 100%;
      min-width: 0;
      overflow: hidden;
      overflow-wrap: break-word;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .theme-btn:hover {
      background: var(--surface-hover);
    }
    .theme-btn.active {
      border-color: var(--accent);
      color: var(--text);
      background: var(--surface);
    }
    .theme-btn .swatch {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      margin-top: 4px;
    }
    .theme-btn.locked {
      opacity: 0.45;
      cursor: not-allowed;
      background: var(--surface-alt);
      color: var(--text-muted);
      font-size: 14px;
      border-color: var(--border-subtle);
      pointer-events: none;
    }
    .theme-btn.locked:hover {
      background: var(--surface-alt);
    }

    .unlock-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      background: var(--accent);
      color: var(--text-on-accent);
      margin-bottom: 8px;
      transition: all 0.15s;
    }
    .unlock-btn:hover {
      background: var(--accent-hover);
    }
    .unlock-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .unlock-btn.all-unlocked {
      background: var(--success);
      cursor: default;
    }
    .unlock-btn.all-unlocked:hover {
      background: var(--success);
    }

    .add-site-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .add-site-row input {
      flex: 1;
      padding: 6px 8px;
      background: var(--surface-alt);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
    }
    .add-site-row input:focus { outline: none; border-color: var(--accent); }

    .timer-section {
      padding: 12px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    #timerDisplay {
      text-align: center;
      font-size: 36px;
      font-weight: bold;
      color: var(--text-secondary);
      padding: 4px 0 8px;
      font-variant-numeric: tabular-nums;
    }
    .timer-presets {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .timer-presets button {
      flex: 1;
      padding: 6px 2px;
      border: 1px solid var(--border);
      background: var(--surface-alt);
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }
    .timer-presets button:hover { background: var(--surface-hover); }
    .timer-presets button:active { background: var(--accent); color: var(--text-on-accent); }
    .timer-actions {
      display: flex;
      gap: 6px;
    }
    .timer-actions input {
      flex: 1;
      padding: 5px 6px;
      background: var(--surface-alt);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      width: 50px;
    }
    .timer-actions input:focus { outline: none; border-color: var(--accent); }
    .timer-btn {
      padding: 5px 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }
    .timer-btn.primary { background: var(--accent); color: var(--text-on-accent); }
    .timer-btn.danger { background: var(--danger); color: var(--white); }

    #customMinutes::-webkit-inner-spin-button,
    #customMinutes::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    #customMinutes { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <input type="radio" name="tab" id="tabTimer" checked>
  <input type="radio" name="tab" id="tabModulation">
  <input type="radio" name="tab" id="tabBlock">
  <input type="radio" name="tab" id="tabGamba">

  <button id="captureBtn" class="start">Start Capture</button>
  <div id="status" class="status idle">Idle</div>

  <div class="tab-bar">
    <label for="tabTimer" class="tab-label">Timer</label>
    <label for="tabModulation" class="tab-label">Modulation</label>
    <label for="tabBlock" class="tab-label">Blocking</label>
    <label for="tabGamba" class="tab-label">🎰</label>
  </div>

  <div id="controls" class="controls">
    <div class="tab-panel" id="panelTimer">
      <div class="timer-section">
        <div id="timerDisplay">00:00</div>
        <div id="countdownControls">
          <div class="timer-presets">
            <button class="preset-btn" data-seconds="900">15m</button>
            <button class="preset-btn" data-seconds="1800">30m</button>
            <button class="preset-btn" data-seconds="3600">60m</button>
            <button class="preset-btn" data-seconds="5400">90m</button>
          </div>
          <div class="timer-actions">
            <input type="number" id="customMinutes" min="1" max="90" value="15" placeholder="min">
            <span style="font-size:11px;color:var(--text-muted);margin-left:2px;flex-shrink:0;">min</span>
            <button id="startBtn" class="timer-btn primary">Start</button>
            <button id="stopBtn" class="timer-btn danger" style="display:none">Stop</button>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="panelModulation">
      <div class="section-box">
        <div class="section-header">
          <label>Presets</label>
        </div>
        <div id="presetGrid"></div>
        <div style="display:flex; gap:6px;">
          <input type="text" id="presetNameInput" placeholder="Preset name..." style="flex:1; padding:5px 6px; background:var(--surface-alt); color:var(--text); border:1px solid var(--border); border-radius:6px; font-size:11px;">
          <button id="savePresetBtn" class="timer-btn primary" style="font-size:11px; white-space:nowrap;">Save</button>
        </div>
      </div>

      <div class="control-group">
        <label>Modulator Frequency <span id="freqValue" class="value">16.0 Hz</span></label>
        <div class="freq-row">
          <button class="freq-step" id="freqDown">-1</button>
          <input type="range" id="frequency" min="1" max="100" step="1" value="16">
          <button class="freq-step" id="freqUp">+1</button>
        </div>
      </div>

      <div class="control-group">
        <label>Depth <span id="depthValue" class="value">50%</span></label>
        <input type="range" id="depth" min="0" max="100" step="1" value="50">
      </div>


      <div class="section-box">
        <div class="section-header">
          <label>
            <input type="checkbox" id="spatialEnabled">
            Spatial Movement
          </label>
        </div>
        <div id="spatialControls" class="section-sub-controls">
          <div class="control-group" style="margin-bottom:8px;">
            <label>Speed <span id="spatialSpeedValue" class="value">0.3 Hz</span></label>
            <input type="range" id="spatialSpeed" min="0.1" max="2" step="0.1" value="0.3">
          </div>
          <div class="control-group">
            <label>Width <span id="spatialWidthValue" class="value">70%</span></label>
            <input type="range" id="spatialWidth" min="0" max="100" step="1" value="70">
          </div>
        </div>
      </div>

      <div class="section-box">
        <div class="section-header">
          <label>
            <input type="checkbox" id="crossoverEnabled">
            Low-Freq Only
          </label>
        </div>
        <div id="crossoverControls" class="section-sub-controls">
          <div class="control-group">
            <label>Crossover Freq <span id="crossoverFreqValue" class="value">300 Hz</span></label>
            <input type="range" id="crossoverFreq" min="50" max="2000" step="10" value="300">
          </div>
        </div>
      </div>

      <div class="section-box">
        <div class="section-header">
          <label>
            <input type="checkbox" id="pinkNoiseEnabled">
            Noise
          </label>
          <label style="margin-left:auto; font-size:11px; color:var(--text-subtle); cursor:pointer; display:flex; align-items:center; gap:4px;">
            <input type="checkbox" id="pinkNoiseModulate">
            Modulate
          </label>
        </div>
        <div id="pinkNoiseControls" class="section-sub-controls">
          <div class="control-group">
            <label>Type</label>
            <select id="noiseType">
              <option value="white">White</option>
              <option value="pink" selected>Pink</option>
              <option value="brown">Brown</option>
              <option value="gray">Gray</option>
            </select>
          </div>
          <div class="control-group">
            <label>Mix <span id="pinkNoiseMixValue" class="value">3%</span></label>
            <input type="range" id="pinkNoiseMix" min="0" max="100" step="1" value="3">
          </div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="panelBlock">
      <label class="toggle-row">
        <input type="checkbox" id="blockEnabled">
        Blocking Active
      </label>
      <div class="mode-toggle">
        <button id="modeReason" class="active">Reason</button>
        <button id="modeBlockBtn">Complete Block</button>
      </div>
      <div id="blockedSiteList"></div>
      <div class="add-site-row">
        <input type="text" id="newSiteInput" placeholder="example.com">
        <button id="addSiteBtn" class="timer-btn primary" style="font-size:11px; white-space:nowrap;">+ Add</button>
      </div>
    </div>
    <div class="tab-panel" id="panelGamba">
      <div class="section-box">
        <button id="unlockBtn" class="unlock-btn">Roll!</button>
        <div id="themeGrid" class="theme-grid"></div>
      </div>
    </div>
    </div>

  <script src="theme-data.js"></script>
  <script src="popup.js"></script>
</body>
</html>
